[phases.setup]
# Mantenemos Node 20, pero devolvemos Nginx y el cliente de MySQL al ecosistema
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20", "nginx", "libmysqlclient"]

[phases.install]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction --optimize-autoloader",
    "npx pnpm@9 i --frozen-lockfile"
]

[phases.build]
cmds = ["npx pnpm@9 run build"]
